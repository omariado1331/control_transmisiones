<!DOCTYPE html>
<html>
<head>
    <title>Inicio - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../static/navbar.css">
    <link rel="stylesheet" href="../../static/inicio.css">
</head>
<body>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../../static/navbar.js"></script>

    <div id="navbar"></div>


    <div class="main-container">
        <!-- Tarjetas de estadísticas - 3 columnas -->
        <div class="stats-grid">
            <!-- Total Actas -->
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="stat-badge">Total</div>
                </div>
                <div class="stat-value" id="totalActas">0</div>
                <div class="stat-label">Actas Registradas</div>
            </div>

            <!-- Total Recintos -->
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fas fa-building"></i>
                    </div>
                    <div class="stat-badge">Total</div>
                </div>
                <div class="stat-value" id="totalRecintos">0</div>
                <div class="stat-label">Recintos Habilitados</div>
            </div>

            <!-- Distribución de Recintos -->
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon">
                        <i class="fas fa-chart-pie"></i>
                    </div>
                    <div class="stat-badge">Distribución</div>
                </div>
                <div class="grafico-wrapper">
                    <div class="grafico-item">
                        <div class="grafico-header">
                            <div class="grafico-nombre">
                                <i class="fas fa-city" style="color: #2196f3;"></i>
                                <span>Urbanos</span>
                            </div>
                            <div class="grafico-porcentaje" id="urbanosPorcentaje">0%</div>
                        </div>
                        <div class="grafico-barra">
                            <div class="grafico-fill fill-urbanos" id="barraUrbanos" style="width: 0%"></div>
                        </div>
                        <div class="grafico-valor">
                            <span id="urbanosValor">0</span> <span>recintos</span>
                        </div>
                    </div>
                    <div class="grafico-item">
                        <div class="grafico-header">
                            <div class="grafico-nombre">
                                <i class="fas fa-tree" style="color: #ff9800;"></i>
                                <span>Rurales</span>
                            </div>
                            <div class="grafico-porcentaje" id="ruralesPorcentaje">0%</div>
                        </div>
                        <div class="grafico-barra">
                            <div class="grafico-fill fill-rurales" id="barraRurales" style="width: 0%"></div>
                        </div>
                        <div class="grafico-valor">
                            <span id="ruralesValor">0</span> <span>recintos</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transmisiones -->
        <div class="seccion-cards">
            <div class="seccion-header">
                <h3><i class="fas fa-broadcast-tower"></i> Últimas Transmisiones</h3>
                <span class="badge-count" id="transmisionesCount">0</span>
            </div>
            <div class="cards-container" id="transmisionesContainer">
                <div class="loader-container"><div class="loader"></div></div>
            </div>
        </div>

        <!-- Actividades -->
        <div class="seccion-cards">
            <div class="seccion-header">
                <h3><i class="fas fa-history"></i> Últimas Actividades</h3>
                <span class="badge-count" id="actividadesCount">0</span>
            </div>
            <div class="cards-container" id="actividadesContainer">
                <div class="loader-container"><div class="loader"></div></div>
            </div>
        </div>
    </div>

<script>

function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}

function loadNavbar() {
    fetch('/static/navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar').innerHTML = data;

            if (window.initNavbar) {
                window.initNavbar();
            }
        })
        .catch(error => {
            console.error('Error al cargar navbar:', error);
            document.getElementById('navbar').innerHTML = '<div class="navbar">Error al cargar navbar</div>';
        });
}


async function cargarDashboard() {
    try {
        const response = await fetch(`${API_BASE_URL}/api/admin/inicio/`, {
            headers: { 'X-CSRFToken': getCSRFToken() }
        });
        
        if (!response.ok) throw new Error('Error al cargar datos');
        mostrarNotificacion("Datos cargados correctamente", "success");
        const data = await response.json();
        
        // Actualizar totales
        document.getElementById('totalActas').textContent = (data.total_actas || 0).toLocaleString();
        document.getElementById('totalRecintos').textContent = (data.total_recintos || 0).toLocaleString();
        
        // Actualizar gráfico de recintos
        const urbanos = data.recintos_urbanos || 0;
        const rurales = data.recintos_rurales || 0;
        const total = urbanos + rurales;
        
        const porcentajeUrbanos = total > 0 ? (urbanos / total) * 100 : 0;
        const porcentajeRurales = total > 0 ? (rurales / total) * 100 : 0;
        
        document.getElementById('barraUrbanos').style.width = `${porcentajeUrbanos}%`;
        document.getElementById('urbanosPorcentaje').textContent = `${Math.round(porcentajeUrbanos)}%`;
        document.getElementById('urbanosValor').textContent = urbanos;
        
        document.getElementById('barraRurales').style.width = `${porcentajeRurales}%`;
        document.getElementById('ruralesPorcentaje').textContent = `${Math.round(porcentajeRurales)}%`;
        document.getElementById('ruralesValor').textContent = rurales;
        
        // Cargar transmisiones
        cargarTransmisiones(data.transmisiones);
        
        // Cargar actividades
        cargarActividades(data.actividades);
        
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('transmisionesContainer').innerHTML = `
            <div class="empty-message">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Error al cargar los datos</p>
            </div>
        `;
        document.getElementById('actividadesContainer').innerHTML = `
            <div class="empty-message">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Error al cargar los datos</p>
            </div>
        `;
    }
}

function cargarTransmisiones(transmisiones) {
    const container = document.getElementById('transmisionesContainer');
    const countSpan = document.getElementById('transmisionesCount');
    
    if (!transmisiones || transmisiones.length === 0) {
        container.innerHTML = `
            <div class="empty-message">
                <i class="fas fa-broadcast-tower"></i>
                <p>No hay transmisiones registradas</p>
            </div>
        `;
        countSpan.textContent = '0';
        return;
    }
    
    countSpan.textContent = transmisiones.length;
    
    let html = '';
    transmisiones.forEach(t => {
        html += `
            <div class="info-card-transmision">
                <div class="card-icon">
                    <i class="fas fa-broadcast-tower"></i>
                </div>
                <div class="card-descripcion">${escapeHtml(t.descripcion)}</div>
                <div class="card-fecha">
                    <i class="fas fa-calendar-alt"></i>
                    <span>${t.fecha || 'Sin fecha'}</span>
                </div>
                <div class="card-hora">
                    <i class="fas fa-clock"></i>
                    <span>${t.hora || 'Sin hora'}</span>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function cargarActividades(actividades) {
    const container = document.getElementById('actividadesContainer');
    const countSpan = document.getElementById('actividadesCount');
    
    if (!actividades || actividades.length === 0) {
        container.innerHTML = `
            <div class="empty-message">
                <i class="fas fa-history"></i>
                <p>No hay actividades registradas</p>
            </div>
        `;
        countSpan.textContent = '0';
        return;
    }
    
    countSpan.textContent = actividades.length;
    
    let html = '';
    actividades.forEach(a => {
        html += `
            <div class="info-card-actividad">
                <div class="card-icon">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div class="card-descripcion">${escapeHtml(a.descripcion)}</div>
                <div class="card-fecha">
                    <i class="fas fa-calendar-alt"></i>
                    <span>${a.fecha || 'Sin fecha'}</span>
                </div>
                <div class="card-hora">
                    <i class="fas fa-clock"></i>
                    <span>${a.hora || 'Sin hora'}</span>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// Función para mostrar notificaciones
function mostrarNotificacion(mensaje, tipo) {
    // Crear elemento de notificación
    const notificacion = document.createElement('div');
    notificacion.className = `notificacion ${tipo}`;
    notificacion.innerHTML = `
        <i class="fas ${tipo === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
        <span>${mensaje}</span>
    `;
    
    // Estilos para la notificación
    notificacion.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${tipo === 'success' ? '#4caf50' : '#f44336'};
        color: white;
        padding: 12px 25px;
        border-radius: 50px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 2000;
        animation: slideIn 0.3s ease;
    `;
    
    document.body.appendChild(notificacion);
    
    // Eliminar después de 3 segundos
    setTimeout(() => {
        notificacion.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => {
            document.body.removeChild(notificacion);
        }, 300);
    }, 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', () => {
    loadNavbar();
    cargarDashboard();
});
</script>
</body>
</html>
